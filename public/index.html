<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Coup Online</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="mainPage" class="tela">
    <h1>Entrar em uma sala</h1>
    <input id="nomeJogadorEntrar" placeholder="Seu nome" />
    <input id="salaId" placeholder="Código da sala" />
    <button id="entrarSala" disabled>Entrar</button>
    <h2>Criar uma sala</h2>
    <input id="nomeJogadorCriar" placeholder="Seu nome" />
    <button id="criarSala" disabled>Criar Sala</button>
  </div>

  <div id="lobbyPage" class="tela" style="display: none;">
    <h2 id="tituloSala">Lobby</h2>
    <header class="container-jogadores" id="containerJogadoresLobby">

    </header>
    <!-- <div class="container-jogadores" id="containerJogadores"></div> -->
    <textarea id="codigoSala"></textarea>
    <button id="iniciarPartida">Iniciar partida</button>
  </div>

  <div id="partidaPage" class="tela" style="display: none;">
    <h2 id="status">Conectando ao jogo...</h2>
    <header class="container-jogadores" id="containerJogadoresPartida">
     
    </header>
    <section class="log-container" id="logContainer">
      <h3>Log de partida</h3>
      <div id="logEntries" class="log-entries"></div>
    </section>
    <div class="container">
      <aside class="sidebar">
        <div class="sidebar-item" id="renda">Auxílio</div>
        <div class="sidebar-item" id="ajuda">Ajuda externa</div>
        <div class="sidebar-item" id="duque">Empréstimo</div>
        <div class="sidebar-item" id="capitao">Roubar</div>
        <div class="sidebar-item" id="assassino">Assassinar</div>
        <div class="sidebar-item" id="embaixador">Trocar cartas</div>
        <div class="sidebar-item" id="golpe">Golpe de estado</div>
      </aside>
      <main class="main">
        <div class="cards">
          <div class="card" id="card1"></div>
          <div class="card" id="card2"></div>
        </div>
        <div id="modal" class="hidden">
          <div class="modal-content">
            <p id="modal-text"></p>

            <button id="bloquear" class="hidden">Bloquear</button>
            <button id="contestar" class="hidden">Contestar</button>
  
          </div>
        </div>
        <div id="modal-alvo" class="hidden">
          <div class="modal-content">
            <p id="modal-alvo-text">Selecione um jogador:</p>
            <div id="lista-alvos"></div>
          </div>
        </div>
        <div id="modal-escolher-carta" class="hidden">
          <div class="modal-content">
            <p id="modal-escolher-carta-text">Selecione uma carta para perder:</p>
            <div id="lista-cartas-perder"></div>
          </div>
        </div>
        <div id="modal-trocar-cartas" class="hidden">
          <div class="modal-content">
            <p id="modal-trocar-cartas-text">Selecione duas cartas para manter:</p>
            <div id="lista-cartas-trocar"></div>
          </div>
        </div>
        <div id="modalFinalPartida" class="hidden">
          <div class="modal-content">
            <p id="modalFinalPartida-text"></p>

            <button id="voltar" class="hidden">Voltar ao Lobby </button>
            
  
          </div>
        </div>
        <div id="moedas" class="currency">2</div>
      </main>
    </div>
    
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
