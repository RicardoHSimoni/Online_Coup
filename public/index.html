<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Jogo SPA</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="mainPage" class="tela">
    <h1>Entrar em uma sala</h1>
    <input id="nomeJogadorEntrar" placeholder="Seu nome" />
    <input id="salaId" placeholder="Código da sala" />
    <button id="entrarSala" disabled>Entrar</button>
    <h2>Criar uma sala</h2>
    <input id="nomeJogadorCriar" placeholder="Seu nome" />
    <button id="criarSala" disabled>Criar Sala</button>
  </div>

  <div id="lobbyPage" class="tela" style="display: none;">
    <h2 id="tituloSala">Lobby</h2>
    <header class="container-jogadores" id="containerJogadoresLobby">

    </header>
    <!-- <div class="container-jogadores" id="containerJogadores"></div> -->
    <textarea id="codigoSala"></textarea>
    <button id="iniciarPartida">Iniciar partida</button>
  </div>

  <div id="partidaPage" class="tela" style="display: none;">
    <h2>BORAAAA</h2>
    <header class="container-jogadores" id="containerJogadoresPartida">
     
    </header>
    <div class="container">
      <aside class="sidebar">
        <!-- Conteúdo lateral -->
      </aside>
      <main class="main">
        <div class="cards">
          <div class="card" id="card1"></div>
          <div class="card" id="card2"></div>
        </div>
        <div class="currency">$</div>
      </main>
    </div>
    
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
